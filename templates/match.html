<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Gợi ý trùng khớp</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<header class="navbar">
    <div class="logo">PTIT Lost & Found</div>
    <nav>
        <a href="/">Trang chủ</a>
        <a href="/lost">Đăng mất đồ</a>
        <a href="/found">Đăng nhặt được</a>
        <a href="/list">Danh sách</a>
        <a href="/search">Tìm kiếm</a>
        <a href="/match">Gợi ý</a>
    </nav>
</header>

<div class="container">
    <h2>Gợi ý trùng khớp</h2>

    {% for l, f, s in results %}
    <div class="match-box">

        <h3 class="match-title">Khả năng trùng khớp</h3>

        <p><b>Đồ mất:</b> {{ l[1] }}</p>
        {% if l[7] %}
        <img src="{{ url_for('static', filename='uploads/' ~ l[7]) }}" class="item-image">
        {% endif %}

        <p><b>Đồ nhặt:</b> {{ f[1] }}</p>
        {% if f[7] %}
        <img src="{{ url_for('static', filename='uploads/' ~ f[7]) }}" class="item-image">
        {% endif %}

        <span class="match-score">Điểm: {{ s }}</span>
    </div>
    {% endfor %}
</div>

</body>
</html>
