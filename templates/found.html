<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhặt được đồ</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header class="navbar">
        <div class="logo">PTIT Lost & Found</div>
        <nav>
            <a href="/">Trang chủ</a>
            <a href="/lost">Đăng mất đồ</a>
            <a href="/found">Đăng nhặt được</a>
            <a href="/list">Danh sách</a>
            <a href="/search">Tìm kiếm</a>
            <a href="/match">Gợi ý</a>
        </nav>
    </header>

    <div class="container">
        <div class="form-box">
            <h2>Đăng nhặt được đồ</h2>
            <form method="post">
                <input type="text" name="item_name" placeholder="Tên đồ vật" required>
                <input type="text" name="category" placeholder="Loại đồ vật" required>
                <textarea name="description" placeholder="Mô tả chi tiết" rows="5"></textarea>
                <input type="text" name="location" placeholder="Địa điểm nhặt được" required>
                <input type="text" name="contact" placeholder="Thông tin liên hệ" required>
                <button type="submit">Đăng bài</button>
            </form>
            <a class="back-link" href="/">← Quay về trang chủ</a>
        </div>
    </div>
</body>
</html>
